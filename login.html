<!DOCTYPE html><html lang="en"><head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="robots" content="index, follow">
<link href="dashboard/logo.png" rel="icon">

<meta name="description" content="Please enter email and password to continue">
<meta property="og:title" content="Login account-Velorix Logistics Services">

<meta property="og:url" content="https://velorixlogistics.org/index.php/login">

<meta property="og:description" content="Please enter email and password to continue">

<meta property="og:image" content="/dashboard/cover.jpg">

<meta property="og:type" content="article">
    <link rel="stylesheet" href="dashboard/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="dashboard/sweetalert.js"></script>

    <title>Login account</title>
</head>

<body>
        <div class="container-fluid">
        <div class="col-sm-12 col-md-8 offset-md-2 mt-md-3 pb-5">
            <div class="row">
    <div class="col-sm-12 col-md-6 offset-md-3 mt-5">
        <div class="card">
            <div class="card-body">
                                <div class="d-flex justify-content-center">
                    <a href="index.html">
                        <img width="300px" src="dashboard/logo.png" alt="">
                    </a>
                </div>
                <h4 class="card-title">Login account</h4>
                <p>Please enter email and password to continue</p>
                <div id="login-error" class="alert alert-danger" style="display:none;"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" required id="email" class="form-control" placeholder="" aria-describedby="helpId">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" required name="password" id="password" class="form-control" placeholder="" aria-describedby="helpId">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>
    



    <script>
const SUPABASE_URL = "https://vqhkwwsceqcusxuykfea.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VyGKi58RF8ZeuaoXqoOYcg_k39PaSz8";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorBox = document.getElementById('login-error');
    errorBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Submit';
        return;
    }

    // Successful login — redirect to admin dashboard
    window.location.href = 'dashboard/index.html';
});
</script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="dashboard/jquery.js"></script>
    <script src="dashboard/popper.js"></script>
    <script src="dashboard/bootstrap.min.js"></script>
    

</body></html>
